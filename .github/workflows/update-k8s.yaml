name: update-k8s
on:
  workflow_call:
    inputs:
      build_backend:
        description: 'Build and push backend image'
        required: true
        default: true
        type: boolean
      build_frontend:
        description: 'Build and push frontend image'
        required: true
        default: true
        type: boolean
      backend_image:
        description: 'Backend image tag to use in Kubernetes manifests'
        required: true
        type: string
      frontend_image:
        description: 'Frontend image tag to use in Kubernetes manifests'
        required: true
        type: string

jobs:
  update-k8s:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allow pushing changes to the repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Kubernetes manifests
        run: |
          if [ "${{ inputs.build_backend }}" = "true" ]; then
            sed -i "s|image: docker.io/sorensen670/k8s-ns-manager-backend:.*|image: ${{ inputs.backend_image }}|g" \
              k8s/manifest.yaml
          fi
          if [ "${{ inputs.build_frontend }}" = "true" ]; then
            sed -i "s|image: docker.io/sorensen670/k8s-ns-manager-frontend:.*|image: ${{ inputs.frontend_image }}|g" \
              k8s/manifest.yaml
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifest.yaml
          git commit -m "Update Kubernetes manifests with new image tags" || echo "No changes to commit"
          git push origin HEAD:main
        shell: bash
